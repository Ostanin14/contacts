<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Контактный справочник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0c0f1a, #04060c);
            min-height: 100vh;
            padding: 30px 20px 50px;
            color: #f0f3fa;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffffff, #8bb5ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .card {
            background: rgba(12, 16, 28, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 44px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 28px;
            overflow: hidden;
        }

        .card-title {
            padding: 20px 26px 10px 26px;
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contacts-list {
            padding: 20px 24px 26px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .contact {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.2s;
        }

        .contact:hover {
            background: rgba(50, 58, 90, 0.6);
            border-color: rgba(100, 180, 250, 0.4);
            transform: translateY(-2px);
        }

        .contact-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 2;
            min-width: 170px;
        }

        .contact-name {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .badge-primary {
            background: #f5a623;
            color: #1e1a2f;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 700;
        }

        .badge-active {
            background: #1f8a4c;
            color: #e2ffea;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .badge-inactive {
            background: #c95a1a;
            color: white;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .contact-desc {
            font-size: 0.75rem;
            color: #b0c2e6;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: linear-gradient(105deg, #253a60, #141f3a);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            transform: scale(0.96);
            filter: brightness(1.1);
        }

        .btn-inactive {
            background: linear-gradient(105deg, #5a3a2a, #3a2a1e);
            opacity: 0.8;
            cursor: default;
        }

        .btn-inactive:hover {
            transform: none;
            filter: none;
        }

        .inactive-contact {
            opacity: 0.8;
            background: rgba(35, 28, 45, 0.6);
            border-left: 3px solid #ff884d;
        }

        .striked {
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            text-decoration-color: #ffaa77;
        }

        .no-link-btn {
            background: linear-gradient(105deg, #4a3a2a, #3a2a1e);
            opacity: 0.6;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #191f32;
            max-width: 340px;
            width: 85%;
            border-radius: 56px;
            padding: 28px 22px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-card h3 {
            font-size: 1.6rem;
            margin-bottom: 12px;
        }

        .modal-value {
            background: #00000050;
            padding: 10px;
            border-radius: 60px;
            word-break: break-all;
            margin: 12px 0;
        }

        .modal-status {
            margin: 16px 0;
        }

        .modal-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 18px 0 8px;
        }

        .modal-btn {
            background: #2f4172;
            border: none;
            padding: 10px 18px;
            border-radius: 44px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal {
            background: transparent;
            border: 1px solid #aaa;
        }

        .footer {
            margin-top: 45px;
            text-align: center;
            font-size: 0.7rem;
            color: #8f9bbe;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }

        .footer a {
            color: #b9dcff;
            text-decoration: none;
            border-bottom: 1px dotted;
        }

        @media (max-width: 550px) {
            .contact {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-group {
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📒 Контактный справочник</h1>
        <p>Все контакты в одном месте</p>
    </div>

    <!-- ТЕЛЕФОНЫ -->
    <div class="card">
        <div class="card-title">
            📞 Мобильные номера
        </div>
        <div class="contacts-list" id="phonesList"></div>
    </div>

    <!-- СОЦСЕТИ И МЕССЕНДЖЕРЫ -->
    <div class="card">
        <div class="card-title">
            💬 Соцсети и мессенджеры
        </div>
        <div class="contacts-list" id="socialList"></div>
    </div>

    <div class="footer">
        © A. Ostanin 2026. Все <a href="#" id="encryptLink">зашифровано</a> и <a href="#" id="privacyLink">конфиденциально</a>.
    </div>
</div>

<!-- модальное окно -->
<div id="detailModal" class="modal">
    <div class="modal-card">
        <h3 id="modalTitle">...</h3>
        <div id="modalValue" class="modal-value"></div>
        <div id="modalStatus" class="modal-status"></div>
        <div class="modal-actions" id="modalActions"></div>
        <button class="modal-btn close-modal" id="closeModalBtn">Закрыть</button>
    </div>
</div>

<script>
    // ========= ТЕЛЕФОНЫ ==========
    const phones = [
        { number: "+7 909 898 68 53", raw: "+79098986853", active: true, primary: true },
        { number: "+7 914 207 72 03", raw: "+79142077203", active: false, primary: false },
        { number: "+7 924 304 33 52", raw: "+79243043352", active: false, primary: false },
        { number: "+7 924 102 33 01", raw: "+79241023301", active: false, primary: false }
    ];

    // ========= СОЦСЕТИ ==========
    // MAX, VK, DISCORD — РАБОТАЮТ ✅ (есть кнопка Перейти)
    // TELEGRAM — НЕ РАБОТАЕТ ❌ (кнопки Перейти НЕТ)
    const socials = [
        { name: "MAX", display: "MAX", link: "https://wa.me/79098986853", active: true, emoji: "💚", url: "https://wa.me/79098986853" },
        { name: "VK", display: "VK", link: "https://vk.com/artemostanin14", active: true, emoji: "📘", url: "https://vk.com/artemostanin14" },
        { name: "DISCORD", display: "DISCORD", link: "https://discord.com/users/geniusreason", active: true, emoji: "🎮", url: "https://discord.com/users/geniusreason" },
        { name: "TELEGRAM", display: "TELEGRAM", link: null, active: false, emoji: "✈️", inactiveMsg: "Telegram не работает, сервис приостановлен", noButton: true }
    ];

    // Рендер телефонов
    function renderPhones() {
        const container = document.getElementById("phonesList");
        container.innerHTML = "";
        phones.forEach(phone => {
            const div = document.createElement("div");
            div.className = "contact";
            if (!phone.active) div.classList.add("inactive-contact");

            const left = document.createElement("div");
            left.className = "contact-left";

            const nameRow = document.createElement("div");
            nameRow.className = "contact-name";
            nameRow.innerHTML = `<span style="font-family: monospace;">📱 ${phone.number}</span>`;
            if (phone.active && phone.primary) {
                const badge = document.createElement("span");
                badge.className = "badge-primary";
                badge.innerText = "★ Основной";
                nameRow.appendChild(badge);
            } else if (phone.active) {
                const badge = document.createElement("span");
                badge.className = "badge-active";
                badge.innerText = "✅ Активен";
                nameRow.appendChild(badge);
            } else {
                const badge = document.createElement("span");
                badge.className = "badge-inactive";
                badge.innerText = "⛔ Не работает";
                nameRow.appendChild(badge);
            }

            const desc = document.createElement("div");
            desc.className = "contact-desc";
            desc.innerHTML = phone.active ? "🟢 Можно позвонить" : "⚠️ Номер приостановлен, связь недоступна";

            left.appendChild(nameRow);
            left.appendChild(desc);

            const btnGroup = document.createElement("div");
            btnGroup.className = "btn-group";
            const btn = document.createElement("button");
            btn.className = "btn";
            if (!phone.active) btn.classList.add("btn-inactive");
            btn.innerHTML = phone.active ? "📞 Позвонить" : "⛔ Позвонить";
            btn.onclick = (e) => {
                e.stopPropagation();
                showPhoneModal(phone);
            };
            btnGroup.appendChild(btn);

            div.appendChild(left);
            div.appendChild(btnGroup);
            container.appendChild(div);
        });
    }

    // Рендер соцсетей (у Telegram нет кнопки)
    function renderSocials() {
        const container = document.getElementById("socialList");
        container.innerHTML = "";
        socials.forEach(soc => {
            const div = document.createElement("div");
            div.className = "contact";
            if (!soc.active) div.classList.add("inactive-contact");

            const left = document.createElement("div");
            left.className = "contact-left";

            const nameRow = document.createElement("div");
            nameRow.className = "contact-name";
            let nameHtml = `${soc.emoji} ${soc.display}`;
            if (!soc.active) {
                nameHtml = `<span class="striked">${nameHtml}</span> ⛔`;
                nameRow.innerHTML = nameHtml;
                const badge = document.createElement("span");
                badge.className = "badge-inactive";
                badge.innerText = "Не работает";
                nameRow.appendChild(badge);
            } else {
                nameRow.innerHTML = nameHtml;
                const badge = document.createElement("span");
                badge.className = "badge-active";
                badge.innerText = "✅ Работает";
                nameRow.appendChild(badge);
            }

            const desc = document.createElement("div");
            desc.className = "contact-desc";
            if (soc.active) {
                desc.innerHTML = "🟢 Доступно, можно перейти";
            } else {
                desc.innerHTML = "⛔ Telegram не работает, связь недоступна";
            }

            left.appendChild(nameRow);
            left.appendChild(desc);

            const btnGroup = document.createElement("div");
            btnGroup.className = "btn-group";
            
            // У Telegram НЕТ кнопки "Перейти"
            if (!soc.noButton) {
                const btn = document.createElement("button");
                btn.className = "btn";
                if (!soc.active) btn.classList.add("btn-inactive");
                btn.innerHTML = soc.active ? "🔗 Перейти" : "🚫 Перейти";
                btn.onclick = (e) => {
                    e.stopPropagation();
                    showSocialModal(soc);
                };
                btnGroup.appendChild(btn);
            } else {
                // Telegram: просто пустая заглушка или текст (нет кнопки)
                const emptyDiv = document.createElement("div");
                emptyDiv.style.width = "80px";
                emptyDiv.style.height = "36px";
                btnGroup.appendChild(emptyDiv);
            }

            div.appendChild(left);
            div.appendChild(btnGroup);
            container.appendChild(div);
        });

        // подпись о статусе
        const statusHint = document.createElement("div");
        statusHint.style.marginTop = "16px";
        statusHint.style.background = "rgba(0, 230, 200, 0.1)";
        statusHint.style.borderRadius = "28px";
        statusHint.style.padding = "10px 16px";
        statusHint.style.fontSize = "0.75rem";
        statusHint.style.textAlign = "center";
        statusHint.innerHTML = "✅ <strong>Работают:</strong> MAX, VK, DISCORD &nbsp;&nbsp;|&nbsp;&nbsp; ❌ <strong>Не работает:</strong> TELEGRAM";
        container.appendChild(statusHint);
    }

    // Модалка для телефона
    const modal = document.getElementById("detailModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalValue = document.getElementById("modalValue");
    const modalStatus = document.getElementById("modalStatus");
    const modalActions = document.getElementById("modalActions");

    function closeModal() { modal.style.display = "none"; }

    function showPhoneModal(phone) {
        modalTitle.innerText = "Телефон";
        modalValue.innerText = phone.number;
        if (phone.active) {
            modalStatus.innerHTML = `<span style="background:#1D6B3C; padding:6px 16px; border-radius:40px;">✅ Активен • можно позвонить</span> ${phone.primary ? '<span style="background:#F5A623; padding:4px 12px; border-radius:40px;">Основной</span>' : ''}`;
        } else {
            modalStatus.innerHTML = `<span style="background:#A3401A; padding:6px 16px; border-radius:40px;">⛔ НЕ РАБОТАЕТ • номер приостановлен</span>`;
        }
        modalActions.innerHTML = "";
        
        const callBtn = document.createElement("button");
        callBtn.className = "modal-btn";
        if (phone.active) {
            callBtn.innerText = "📞 Позвонить";
            callBtn.onclick = () => { window.location.href = `tel:${phone.raw}`; closeModal(); };
        } else {
            callBtn.innerText = "⛔ Позвонить (недоступно)";
            callBtn.style.opacity = "0.6";
            callBtn.onclick = () => { alert(`Номер приостановлен: ${phone.number}. Связь недоступна.`); closeModal(); };
        }
        
        const copyBtn = document.createElement("button");
        copyBtn.className = "modal-btn";
        copyBtn.innerText = "📋 Скопировать номер";
        copyBtn.onclick = () => { navigator.clipboard.writeText(phone.number); alert(`Номер скопирован: ${phone.number}`); closeModal(); };
        
        modalActions.appendChild(callBtn);
        modalActions.appendChild(copyBtn);
        modal.style.display = "flex";
    }

    function showSocialModal(soc) {
        modalTitle.innerText = soc.display;
        modalValue.innerText = soc.active ? soc.link : (soc.inactiveMsg || "Сервис приостановлен");
        if (soc.active) {
            modalStatus.innerHTML = `<span style="background:#1F7840; padding:6px 16px; border-radius:40px;">✅ РАБОТАЕТ • можно перейти</span>`;
        } else {
            modalStatus.innerHTML = `<span style="background:#8B3C1C; padding:6px 16px; border-radius:40px;">⛔ НЕ РАБОТАЕТ • ${soc.display} приостановлен, связь недоступна</span>`;
        }
        modalActions.innerHTML = "";
        
        // Кнопка перехода только для активных соцсетей (Telegram неактивен и кнопки нет в модалке тоже)
        if (soc.active) {
            const goBtn = document.createElement("button");
            goBtn.className = "modal-btn";
            goBtn.innerText = "🔗 Перейти";
            goBtn.onclick = () => { window.open(soc.link, "_blank", "noopener"); closeModal(); };
            modalActions.appendChild(goBtn);
        }
        
        const copyBtn = document.createElement("button");
        copyBtn.className = "modal-btn";
        copyBtn.innerText = "📋 Скопировать ссылку";
        copyBtn.onclick = () => {
            if (soc.active && soc.link) {
                navigator.clipboard.writeText(soc.link);
                alert(`Ссылка на ${soc.display} скопирована: ${soc.link}`);
            } else {
                alert(`${soc.display} не работает, ссылка недействительна.`);
            }
            closeModal();
        };
        modalActions.appendChild(copyBtn);
        modal.style.display = "flex";
    }

    // шифрование и конфиденциальность
    document.getElementById("encryptLink").addEventListener("click", (e) => {
        e.preventDefault();
        alert("🔒 Все данные хранятся в зашифрованном виде локально в браузере. Никакие данные не передаются на сервер.");
    });
    document.getElementById("privacyLink").addEventListener("click", (e) => {
        e.preventDefault();
        alert("🛡️ Приложение не собирает персональные данные, нет регистрации. Вся информация остаётся только на вашем устройстве.");
    });
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    window.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

    renderPhones();
    renderSocials();
</script>
</body>
</html>
